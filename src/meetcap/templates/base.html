<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Meetcap{% endblock %}</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f5f5f7;
  --surface: #ffffff;
  --border: #e0e0e5;
  --text: #1d1d1f;
  --text-secondary: #6e6e73;
  --accent: #0071e3;
  --accent-hover: #0077ed;
  --badge-bg: #e8f0fe;
  --badge-text: #1a56db;
  --done-bg: #f0fdf4;
  --done-text: #16a34a;
  --code-bg: #f3f4f6;
  --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1c1c1e;
    --surface: #2c2c2e;
    --border: #3a3a3c;
    --text: #f5f5f7;
    --text-secondary: #98989d;
    --accent: #2997ff;
    --accent-hover: #409cff;
    --badge-bg: #1e3a5f;
    --badge-text: #70b8ff;
    --done-bg: #0a2e1a;
    --done-text: #34d058;
    --code-bg: #3a3a3c;
    --shadow: 0 1px 3px rgba(0,0,0,.3), 0 1px 2px rgba(0,0,0,.2);
  }
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 15px;
  line-height: 1.6;
}

.container { max-width: 860px; margin: 0 auto; padding: 24px 20px; }

header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 24px;
}

header a { text-decoration: none; color: var(--text); }
header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }

nav { display: flex; gap: 16px; margin-left: auto; }
nav a {
  color: var(--accent);
  text-decoration: none;
  font-size: 14px;
  font-weight: 500;
}
nav a:hover { color: var(--accent-hover); }

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px 20px;
  margin-bottom: 12px;
  box-shadow: var(--shadow);
}

.badge {
  display: inline-flex;
  align-items: center;
  background: var(--badge-bg);
  color: var(--badge-text);
  border-radius: 12px;
  padding: 2px 8px;
  font-size: 12px;
  font-weight: 600;
  white-space: nowrap;
}
.badge.done {
  background: var(--done-bg);
  color: var(--done-text);
}

a { color: var(--accent); }
a:hover { color: var(--accent-hover); }

h2 { font-size: 17px; font-weight: 600; margin-bottom: 4px; }

.section-title {
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: var(--text-secondary);
  margin: 24px 0 10px;
}

button, .btn {
  display: inline-block;
  padding: 5px 12px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 500;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  cursor: pointer;
  text-decoration: none;
  line-height: 1.4;
  transition: background .15s, border-color .15s;
}
button:hover, .btn:hover { background: var(--bg); }
button.primary, .btn.primary {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}
button.primary:hover, .btn.primary:hover {
  background: var(--accent-hover);
  border-color: var(--accent-hover);
}

/* Markdown prose */
.prose { overflow: hidden; }
.prose h1 { font-size: 20px; margin: 20px 0 10px; font-weight: 700; }
.prose h2 { font-size: 17px; margin: 16px 0 8px; font-weight: 600; }
.prose h3 { font-size: 15px; margin: 12px 0 6px; font-weight: 600; }
.prose p { margin-bottom: 12px; }
.prose ul, .prose ol { margin: 6px 0 12px 22px; }
.prose li { margin-bottom: 4px; }
.prose code { background: var(--code-bg); padding: 1px 5px; border-radius: 4px; font-size: 13px; }
.prose pre { background: var(--code-bg); padding: 12px 16px; border-radius: 8px; overflow-x: auto; margin-bottom: 12px; }
.prose pre code { background: none; padding: 0; }
.prose blockquote { border-left: 3px solid var(--border); padding-left: 12px; color: var(--text-secondary); margin-bottom: 12px; }
.prose table { border-collapse: collapse; width: 100%; margin-bottom: 12px; }
.prose th, .prose td { border: 1px solid var(--border); padding: 6px 10px; text-align: left; }
.prose th { background: var(--bg); font-weight: 600; }

details > summary {
  cursor: pointer;
  font-weight: 600;
  font-size: 14px;
  color: var(--text-secondary);
  padding: 10px 0;
  user-select: none;
}
details > summary:hover { color: var(--text); }
details[open] > summary { margin-bottom: 10px; }

.action-item {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
}
.action-item:last-child { border-bottom: none; }
.action-item.closed { opacity: 0.5; }
.action-item .text { flex: 1; font-size: 14px; }

{% block extra_style %}{% endblock %}
</style>
</head>
<body>
<div class="container">
  <header>
    <a href="/"><h1>Meetcap</h1></a>
    <nav>
      <a href="/">Recordings</a>
      <a href="/actions">Action Items{% if total_open %}&nbsp;<span class="badge">{{ total_open }}</span>{% endif %}</a>
    </nav>
  </header>
  {% block content %}{% endblock %}
</div>
</body>
</html>
